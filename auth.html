<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>measup – Anmelden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#b8842a;--gold-lt:#c89840;--gold-bg:rgba(184,132,42,.10);
  --dark:#16140f;--dark2:#1e1b14;--dark3:#252018;
  --txt:#f0ede7;--txt2:#b8b4ac;--txt3:#6a6660;
  --border:#2e2e2e;--border2:#3a3a3a;
  --red:#c0392b;--green:#1a8a44;
  --radius:8px;--radius-lg:14px;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--dark);color:var(--txt);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}

/* ── Brand ── */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:40px;text-decoration:none}
.brand-wordmark{font-size:22px;letter-spacing:-.3px}
.brand-wordmark strong{font-weight:700;color:var(--txt)}
.brand-wordmark span{font-weight:300;color:var(--gold)}

/* ── Card ── */
.card{width:100%;max-width:400px;background:var(--dark2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:36px 32px}
.card-title{font-size:20px;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.card-sub{font-size:13px;color:var(--txt2);margin-bottom:28px;line-height:1.6}

/* ── Tabs ── */
.tabs{display:flex;gap:0;margin-bottom:28px;background:var(--dark3);border-radius:var(--radius);padding:3px}
.tab{flex:1;padding:8px;border:none;background:transparent;color:var(--txt2);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:6px;transition:all .15s}
.tab.active{background:var(--dark2);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.3)}

/* ── Form ── */
.field{margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt3);margin-bottom:7px;font-family:'DM Mono',monospace}
input{width:100%;padding:12px 14px;background:var(--dark3);border:1px solid var(--border2);border-radius:var(--radius);color:var(--txt);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .15s}
input::placeholder{color:var(--txt3)}
input:focus{border-color:var(--gold)}
input.error{border-color:var(--red)}

.btn{width:100%;padding:13px;background:var(--gold);border:none;border-radius:var(--radius);color:#fff;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:8px;min-height:48px}
.btn:hover{background:var(--gold-lt)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-secondary{background:transparent;border:1px solid var(--border2);color:var(--txt2);margin-top:8px}
.btn-secondary:hover{border-color:var(--gold);color:var(--txt);background:transparent}

/* ── Messages ── */
.msg{padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:none;line-height:1.5}
.msg.error{background:rgba(192,57,43,.12);border:1px solid rgba(192,57,43,.3);color:#e07060;display:block}
.msg.success{background:rgba(26,138,68,.12);border:1px solid rgba(26,138,68,.3);color:#50b878;display:block}
.msg.info{background:var(--gold-bg);border:1px solid rgba(184,132,42,.3);color:#c89840;display:block}

/* ── Divider ── */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--txt3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Footer ── */
.auth-footer{margin-top:24px;font-size:12px;color:var(--txt3);text-align:center}
.auth-footer a{color:var(--txt2);text-decoration:none}
.auth-footer a:hover{color:var(--gold)}

/* ── Forgot password ── */
.forgot{font-size:12px;color:var(--txt3);text-align:right;margin-top:-8px;margin-bottom:16px;cursor:pointer;transition:color .15s}
.forgot:hover{color:var(--gold)}
</style>
</head>
<body>

<a href="/" class="brand">
  <svg width="32" height="32" viewBox="0 0 60 60" fill="none">
    <rect width="60" height="60" rx="13" fill="#b8842a"/>
    <path d="M13 46 L13 22 L30 38 L47 22 L47 46" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 38 L30 14 M25 19 L30 14 L35 19" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span class="brand-wordmark"><strong>meas</strong><span>up</span></span>
</a>

<div class="card">
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Anmelden</button>
    <button class="tab" onclick="showTab('register')">Registrieren</button>
  </div>

  <div id="msg" class="msg"></div>

  <!-- ── LOGIN ── -->
  <div id="tab-login">
    <div class="field">
      <label>E-Mail</label>
      <input type="email" id="login-email" placeholder="deine@email.de" autocomplete="email">
    </div>
    <div class="field">
      <label>Passwort</label>
      <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="forgot" onclick="showForgot()">Passwort vergessen?</div>
    <button class="btn" id="login-btn" onclick="handleLogin()">Anmelden →</button>

    <div class="divider">oder</div>
    <button class="btn btn-secondary" onclick="handleMagicLink()">✉ Magic Link per E-Mail</button>
  </div>

  <!-- ── REGISTER ── -->
  <div id="tab-register" style="display:none">
    <div class="field">
      <label>E-Mail</label>
      <input type="email" id="reg-email" placeholder="deine@email.de" autocomplete="email">
    </div>
    <div class="field">
      <label>Passwort</label>
      <input type="password" id="reg-pw" placeholder="Mindestens 8 Zeichen" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Passwort bestätigen</label>
      <input type="password" id="reg-pw2" placeholder="••••••••" autocomplete="new-password">
    </div>
    <button class="btn" id="reg-btn" onclick="handleRegister()">Konto erstellen →</button>
  </div>

  <!-- ── FORGOT PASSWORD ── -->
  <div id="tab-forgot" style="display:none">
    <p style="font-size:13px;color:var(--txt2);margin-bottom:20px;line-height:1.6">Gib deine E-Mail ein — wir schicken dir einen Link zum Zurücksetzen.</p>
    <div class="field">
      <label>E-Mail</label>
      <input type="email" id="forgot-email" placeholder="deine@email.de">
    </div>
    <button class="btn" onclick="handleForgot()">Reset-Link senden →</button>
    <button class="btn btn-secondary" onclick="showTab('login')">← Zurück</button>
  </div>
</div>

<div class="auth-footer">
  <a href="/">← Zurück zur Startseite</a> &nbsp;·&nbsp;
  <a href="/impressum.html">Impressum</a> &nbsp;·&nbsp;
  <a href="/datenschutz.html">Datenschutz</a>
</div>

<script>
const SUPABASE_URL = 'https://dfobvtluyxikloyphfwf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmb2J2dGx1eXhpa2xveXBoZndmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTkzNzcsImV4cCI6MjA5MjE3NTM3N30.X9KiYJRotf9dn8UWt1_mi4kkoEjPdlj4wBkweS1xVI8';

// ── Supabase Auth Helper ──
const auth = {
  async signIn(email, password) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    return res.json();
  },
  async signUp(email, password) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    return res.json();
  },
  async magicLink(email) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, create_user: false })
    });
    return res.json();
  },
  async resetPassword(email) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email })
    });
    return res.json();
  },
  saveSession(data) {
    if (data.access_token) {
      localStorage.setItem('sb_access_token', data.access_token);
      localStorage.setItem('sb_refresh_token', data.refresh_token || '');
      localStorage.setItem('sb_user', JSON.stringify(data.user || {}));
    }
  },
  getSession() {
    return localStorage.getItem('sb_access_token');
  }
};

// ── Check ob schon eingeloggt ──
if (auth.getSession()) {
  window.location.href = '/app.html';
}

// ── Check für Magic Link / Password Reset Callback ──
const hash = window.location.hash;
if (hash.includes('access_token')) {
  const params = new URLSearchParams(hash.substring(1));
  const token = params.get('access_token');
  const refresh = params.get('refresh_token');
  const type = params.get('type');
  if (token) {
    localStorage.setItem('sb_access_token', token);
    localStorage.setItem('sb_refresh_token', refresh || '');
    if (type === 'recovery') {
      showMsg('Passwort zurücksetzen — bitte gib unten ein neues Passwort ein.', 'info');
    } else {
      window.location.href = '/app.html';
    }
  }
}

// ── Tab-Wechsel ──
function showTab(tab) {
  ['login', 'register', 'forgot'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === tab ? '' : 'none';
  });
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  clearMsg();
}

function showForgot() {
  showTab('forgot');
}

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
}

function clearMsg() {
  const el = document.getElementById('msg');
  el.className = 'msg';
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Bitte warten …' : btn.dataset.label;
}

// Speichere ursprüngliche Button-Labels
document.addEventListener('DOMContentLoaded', () => {
  ['login-btn', 'reg-btn'].forEach(id => {
    const btn = document.getElementById(id);
    if (btn) btn.dataset.label = btn.textContent;
  });
});

// ── Login ──
async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!email || !pw) { showMsg('Bitte E-Mail und Passwort eingeben.'); return; }

  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Anmelden …';

  const data = await auth.signIn(email, pw);

  if (data.access_token) {
    auth.saveSession(data);
    window.location.href = '/app.html';
  } else {
    const msg = data.error_description || data.msg || 'Anmeldung fehlgeschlagen.';
    showMsg(msg === 'Invalid login credentials' ? 'E-Mail oder Passwort falsch.' : msg);
    btn.disabled = false; btn.textContent = 'Anmelden →';
  }
}

// ── Registrierung ──
async function handleRegister() {
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-pw').value;
  const pw2 = document.getElementById('reg-pw2').value;

  if (!email || !pw) { showMsg('Bitte alle Felder ausfüllen.'); return; }
  if (pw.length < 8) { showMsg('Passwort muss mindestens 8 Zeichen haben.'); return; }
  if (pw !== pw2) { showMsg('Passwörter stimmen nicht überein.'); return; }

  const btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Konto wird erstellt …';

  const data = await auth.signUp(email, pw);

  if (data.id || data.user?.id) {
    showMsg('Konto erstellt! Bitte bestätige deine E-Mail-Adresse — dann kannst du dich anmelden.', 'success');
    btn.disabled = false; btn.textContent = 'Konto erstellen →';
  } else {
    const msg = data.msg || data.error_description || 'Registrierung fehlgeschlagen.';
    showMsg(msg === 'User already registered' ? 'Diese E-Mail ist bereits registriert.' : msg);
    btn.disabled = false; btn.textContent = 'Konto erstellen →';
  }
}

// ── Magic Link ──
async function handleMagicLink() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showMsg('Bitte zuerst deine E-Mail eingeben.'); return; }

  const data = await auth.magicLink(email);
  if (data.error) {
    showMsg('Fehler: ' + (data.msg || data.error));
  } else {
    showMsg('Magic Link gesendet! Schau in dein Postfach.', 'success');
  }
}

// ── Passwort vergessen ──
async function handleForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showMsg('Bitte E-Mail eingeben.'); return; }

  await auth.resetPassword(email);
  showMsg('Reset-Link gesendet! Schau in dein Postfach.', 'success');
}

// ── Enter-Taste ──
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.getElementById('tab-login').style.display !== 'none') handleLogin();
    else if (document.getElementById('tab-register').style.display !== 'none') handleRegister();
  }
});
</script>
</body>
</html>
